<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" /> <!--tag was used to force older versions of Internet Explorer (IE) to use their latest available rendering engine-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile card UI Design</title>
    <!--Linking CSS-->
    <link rel="stylesheet" href="styles.css">

    <!--boxicons css-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="profile.jpeg" alt="profile-image" class="profile-image">
        </div>

        <div class="text-data">
            <span class="name">Vedika Kedar</span>
            <span class="job">Developer</span>
        </div>

        <div class="media-buttons">
            <a href="#" style="background: #1da1f2;" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="#" style="background: #e1306c;" class="link">
                <i class='bx bxl-instagram-alt' ></i>
            </a>
            <a href="#" style="background: #4267b2;" class="link">
                <i class='bx bxl-facebook-circle' ></i>
            </a>
            <a href="#" class="link">
                <i class='bx bxl-linkedin-square' ></i>
            </a>
        </div>
        <div class="buttons">
            <button class="button">
                Follow
            </button>
            <button class="button">
                Message
            </button>
        </div>
        <div class="analytics">
            <div class="data">
                <i class='bx bxs-heart' ></i>
                <span class="number">1M</span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded' ></i>
                <span class="number">1M</span>
            </div>
            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="number">1M</span>
            </div>
        </div>
    </div>
</body>
</html>
